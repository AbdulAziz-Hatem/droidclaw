name: 🤖 Build DroidClaw APK (ARM64)

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Custom version name (leave blank for auto)'
        required: false
        type: string

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-arm64:
    name: 🔨 Build ARM64 APK
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed for releases

    steps:
      # ─────────────────────────────────────────
      # 📂 Checkout
      # ─────────────────────────────────────────
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # ☕ Java Setup
      # ─────────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ─────────────────────────────────────────
      # 💙 Flutter Setup (version محدد ومستقر)
      # ─────────────────────────────────────────
      - name: 💙 Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      # ─────────────────────────────────────────
      # 📦 Dependencies
      # ─────────────────────────────────────────
      - name: 📦 Get Dependencies
        run: flutter pub get

      # ─────────────────────────────────────────
      # 🔨 Generate Code (build_runner) - معالجة الأخطاء
      # ─────────────────────────────────────────
      - name: 🔨 Generate Code (build_runner)
        run: |
          echo "🧹 Cleaning old generated files..."
          dart run build_runner clean 2>&1 || true
          echo "🏗️ Generating fresh .g.dart files..."
          dart run build_runner build --delete-conflicting-outputs 2>&1 || echo "⚠️ build_runner had issues, checking if generated files exist..."
          echo "📋 Checking for generated files..."
          find lib -name "*.g.dart" -o -name "*.freezed.dart" 2>/dev/null | head -20 || echo "No generated files found"

      # ─────────────────────────────────────────
      # 🏗️ Build ARM64 APK فقط
      # ─────────────────────────────────────────
      - name: 🏗️ Build ARM64 Release APK
        id: build
        run: |
          echo "📱 Building ARM64 APK only..."
          flutter build apk --release --target-platform android-arm64 --split-per-abi 2>&1 | tee build-output.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "BUILD_EXIT_CODE=$BUILD_EXIT" >> $GITHUB_OUTPUT
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "❌ BUILD FAILED! Last 100 lines:"
            tail -100 build-output.log
            exit $BUILD_EXIT
          fi

      # ─────────────────────────────────────────
      # 📤 Upload Build Log (if failed)
      # ─────────────────────────────────────────
      - name: 📋 Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.log
          retention-days: 5

      # ─────────────────────────────────────────
      # 📊 APK Info
      # ─────────────────────────────────────────
      - name: 📊 APK Info
        run: |
          echo "✅ Build completed!"
          echo ""
          echo "📱 APK Files:"
          find build -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "⚠️ No APK files found"
          echo ""
          echo "📦 APK Sizes:"
          find build -name "*.apk" -exec sh -c 'echo "  $(du -h "$1" | cut -f1) - $(basename "$1")"' _ {} \; 2>/dev/null

      # ─────────────────────────────────────────
      # 📤 Upload ARM64 APK كـ Artifact
      # ─────────────────────────────────────────
      - name: 📤 Upload ARM64 APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: droidclaw-arm64-v8a-${{ github.sha }}
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 90
          if-no-files-found: error

      # ─────────────────────────────────────────
      # 🚀 Create/Update Release (عند دفع Tag فقط)
      # ─────────────────────────────────────────
      - name: 🚀 Create GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          tag_name: ${{ github.ref_name }}
          name: "🤖 DroidClaw ${{ github.ref_name }}"
          body: |
            ## 🤖 DroidClaw ${{ github.ref_name }}

            ### 📱 Download
            | الملف | الحجم | المعمارية |
            |------|------|-----------|
            | `DroidClaw-ARM64.apk` | (انظر أدناه) | ARM64-v8a |

            **للتثبيت:**
            1. حمّل ملف APK أعلاه
            2. فعّل "التثبيت من مصادر غير معروفة" في إعدادات هاتفك
            3. افتح ملف APK وقم بتثبيته
            4. شغّل DroidClaw واختر مزود AI!

            ### 📋 المتطلبات
            - Android 5.0+ (API 21+)
            - ذاكرة ~50MB للتطبيق

            ### 🔧 ملاحظات
            - هذا الإصدار ARM64-v8a فقط (لمعالجات 64-bit)
            - الـ APK غير موقّع (Unsigned) - آمن للتثبيت اليدوي
            - تم بناء هذا الإصدار تلقائياً عبر GitHub Actions
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}